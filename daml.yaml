sdk-version: 3.4.11
name: tirai-desk
version: 0.1.0
source: daml
# `tirai-desk` defines NO interfaces of its own — the token interfaces it deals in
# are the frozen Canton Token Standard (CIP-0056) packages below — so the package
# upgrades cleanly forever (no in-package-interface SCU wall).
dependencies:
  - daml-prim
  - daml-stdlib
# Canton Network Token Standard (CIP-0056) interface packages — the frozen 1.0.0 API
# DARs from the Splice release bundle. Never recompiled locally: the package-ids must
# match what live registries (cETH, CBTC, Canton Coin) implement against, and these
# exact DARs are already vetted on every DevNet validator.
data-dependencies:
  - dars/splice-api-token-metadata-v1-1.0.0.dar
  - dars/splice-api-token-holding-v1-1.0.0.dar
  - dars/splice-api-token-allocation-v1-1.0.0.dar
  - dars/splice-api-token-allocation-request-v1-1.0.0.dar
